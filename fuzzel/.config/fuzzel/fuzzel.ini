[main]
font=JetBrains Nerdfont:size=15
use-bold=yes
fields=filename,name,generic
filter-desktop=yes
show-actions=yes
lines=10
width=50
tabs=4
horizontal-pad=20
vertical-pad=4
inner-pad=10
render-workers=0
match-workers=0
enable-mouse=no
auto-select=yes
terminal=foot -a '{cmd}' -T '{cmd}' {cmd}

[colors]
background=00000000
text=e6e6e6ff
prompt=00e5ffff
placeholder=93a1a1ff
input=657b83ff
match=cb4b16ff
selection=eee8d5ff
selection-text=586e75ff
selection-match=cb4b16ff
counter=93a1a1ff
border=002b36ff

[border]
selection-radius=10

